name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@69cfbfb482c04fb3f583191300d65601972c2533 # v4.1.7
      with:
        persist-credentials: false

    - name: set up JDK 17
      uses: actions/setup-java@387ac27123f328f0853c30d4774a728e897d930a # v4.2.1
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Unit Tests
      run: ./gradlew test

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@0b2256b8c012f0828bd5c120a89476100780521f # v4.3.4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
